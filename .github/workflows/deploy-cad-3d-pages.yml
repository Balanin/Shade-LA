name: Deploy UI + cad-3d to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "ShadeLA/**"
      - ".github/workflows/deploy-cad-3d-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            ShadeLA/package-lock.json
            ShadeLA/cad-3d/package-lock.json

      - name: Install UI
        working-directory: ShadeLA
        run: npm install

      - name: Build UI (Vite)
        working-directory: ShadeLA
        env:
          VITE_ANALYSIS_API_BASE_URL: https://shade-p.onrender.com
        run: npm run build

      - name: Install cad-3d
        working-directory: ShadeLA/cad-3d
        run: npm install

      - name: Disable cad-3d API routes for Pages export
        working-directory: ShadeLA/cad-3d
        run: |
          rm -rf src/app/api

      - name: Build cad-3d (static export)
        working-directory: ShadeLA/cad-3d
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          CESIUM_ION_TOKEN: ${{ secrets.CESIUM_ION_TOKEN }}
        run: |
          npm run build
          ls -la

      - name: Merge cad-3d into UI dist
        run: |
          rm -rf ShadeLA/dist/cad-3d
          mkdir -p ShadeLA/dist/cad-3d
          if [ -d "ShadeLA/cad-3d/out" ]; then
            cp -R ShadeLA/cad-3d/out/* ShadeLA/dist/cad-3d/
          elif [ -d "ShadeLA/out" ]; then
            cp -R ShadeLA/out/* ShadeLA/dist/cad-3d/
          else
            echo "ERROR: cad-3d export output directory not found. Expected ShadeLA/cad-3d/out or ShadeLA/out"
            echo "Listing ShadeLA/cad-3d:" && ls -la ShadeLA/cad-3d || true
            echo "Listing ShadeLA:" && ls -la ShadeLA || true
            exit 1
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ShadeLA/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
