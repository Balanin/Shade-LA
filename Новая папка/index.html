<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBJ Mesh Visualizer</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: #1a1a1a;
            color: white;
        }
        
        #container {
            display: flex;
            height: 100vh;
        }
        
        #viewer {
            flex: 1;
            position: relative;
        }
        
        #controls {
            width: 300px;
            background: #2a2a2a;
            padding: 20px;
            overflow-y: auto;
            box-shadow: -2px 0 10px rgba(0,0,0,0.5);
        }
        
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            padding: 10px;
            border-radius: 5px;
            font-size: 12px;
            z-index: 100;
        }
        
        .control-group {
            margin-bottom: 20px;
        }
        
        .control-group h3 {
            margin: 0 0 10px 0;
            color: #4CAF50;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
        }
        
        input[type="range"] {
            width: 100%;
            margin-bottom: 10px;
        }
        
        input[type="color"] {
            width: 50px;
            height: 30px;
            border: none;
            border-radius: 3px;
        }
        
        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 3px;
            cursor: pointer;
            margin-right: 10px;
            margin-bottom: 5px;
        }
        
        button:hover {
            background: #45a049;
        }
        
        .stats {
            font-size: 12px;
            line-height: 1.4;
        }
        
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 18px;
            z-index: 200;
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="viewer">
            <div id="loading" class="loading">Loading mesh...</div>
            <div id="info">
                <div class="stats">
                    <div>Vertices: <span id="vertexCount">0</span></div>
                    <div>Faces: <span id="faceCount">0</span></div>
                    <div>Bounds: <span id="bounds">-</span></div>
                </div>
            </div>
        </div>
        <div id="controls">
            <div class="control-group">
                <h3>Load</h3>
                <label>Select OBJ file:</label>
                <input type="file" id="objFileInput" accept=".obj">
            </div>
            <div class="control-group">
                <h3>Camera Controls</h3>
                <button onclick="resetCamera()">Reset Camera</button>
                <button onclick="toggleWireframe()">Toggle Wireframe</button>
            </div>
            
            <div class="control-group">
                <h3>Material</h3>
                <label>Color:</label>
                <input type="color" id="meshColor" value="#4CAF50" onchange="updateMeshColor()">
                
                <label>Opacity:</label>
                <input type="range" id="opacity" min="0" max="1" step="0.1" value="1" onchange="updateOpacity()">
                <span id="opacityValue">1.0</span>
            </div>
            
            <div class="control-group">
                <h3>Lighting</h3>
                <label>Ambient Light:</label>
                <input type="range" id="ambientLight" min="0" max="2" step="0.1" value="0.4" onchange="updateLighting()">
                <span id="ambientValue">0.4</span>
                
                <label>Directional Light:</label>
                <input type="range" id="directionalLight" min="0" max="2" step="0.1" value="1" onchange="updateLighting()">
                <span id="directionalValue">1.0</span>
            </div>
            
            <div class="control-group">
                <h3>Mesh Alignment</h3>
                <button onclick="alignToX()">Align to X-axis</button>
                <button onclick="alignToY()">Align to Y-axis</button>
                <button onclick="alignToZ()">Align to Z-axis</button>
                <button onclick="resetRotation()">Reset Rotation</button>
                
                <label style="margin-top: 10px;">Manual Rotation:</label>
                <label>X-axis:</label>
                <input type="range" id="rotationX" min="-180" max="180" step="1" value="-90" onchange="updateRotation()">
                <span id="rotationXValue">-90°</span>
                
                <label>Y-axis:</label>
                <input type="range" id="rotationY" min="-180" max="180" step="1" value="0" onchange="updateRotation()">
                <span id="rotationYValue">0°</span>
                
                <label>Z-axis:</label>
                <input type="range" id="rotationZ" min="-180" max="180" step="1" value="0" onchange="updateRotation()">
                <span id="rotationZValue">0°</span>
            </div>
            
            <div class="control-group">
                <h3>Display Options</h3>
                <button onclick="toggleAxes()">Toggle Axes</button>
                <button onclick="toggleGrid()">Toggle Grid</button>
                <button onclick="toggleNormals()">Toggle Normals</button>
            </div>
            
            <div class="control-group">
                <h3>Export</h3>
                <button onclick="exportScene()">Export as Image</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/OBJLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/helpers/VertexNormalsHelper.js"></script>
    <script src="obj-parser.js"></script>
    <script src="viewer.js"></script>
</body>
</html>
